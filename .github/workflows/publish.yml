name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  name: 'Desomnia'
  VERSION_NET: '9.0'
  VERSION_DESOMNIA: ${{ github.ref_name }}

jobs:

  build-plugins:
    name: Build Desomnia plugin
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Removed Windows-specific plugins. Only building cross-platform plugins.
        name: [ FirewallKnockOperator ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '${{ env.VERSION_NET }}.x'

      - name: Publish ${{ matrix.name }}
        run: |
          dotnet publish plugins/${{ matrix.name }}/${{ matrix.name }}.csproj \
            -o ${{ runner.temp }}/publish/${{ matrix.name }} \
            -f net${{ env.VERSION_NET }} \
            -c Release \
            --no-self-contained \
            -p:DebugType=None \
            -p:DebugSymbols=false \
            -p:PublishSingleFile=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.name }}
          path: ${{ runner.temp }}/publish/
          if-no-files-found: error

  build-linux:
    name: Build DesomniaDaemon
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # ONLY building for linux-arm (Raspberry Pi 2 B). Nothing else.
        arch:[ arm ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '${{ env.VERSION_NET }}.x'
          
      - name: Publish DesomniaDaemon (${{ matrix.arch }})
        run: |
          dotnet publish DesomniaDaemon/DesomniaDaemon.csproj \
            -o ${{ runner.temp }}/publish \
            -f net${{ env.VERSION_NET }} \
            -c Release \
            -r linux-${{ matrix.arch }} \
            --no-self-contained \
            -p:DebugSymbols=false \
            -p:PublishSingleFile=true \
            -p:PublishReadyToRun=true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: ${{ runner.temp }}/publish/desomniad
          if-no-files-found: error

  release:
    name: Create release
    needs: [ build-plugins, build-linux ]
    runs-on: ubuntu-latest
    steps:
      - name: Download linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: linux-*
          path: ${{ runner.temp }}/linux

      - name: Create linux archives
        shell: bash
        run: |
          VERSION="${{ env.VERSION_DESOMNIA }}"
          VERSION="${VERSION#v}"

          cd ${{ runner.temp }}/linux

          for platform_dir in */; do
            if [ -d "$platform_dir" ]; then
              cd "$platform_dir"
              zip -r "${{ runner.temp }}/Desomnia_${VERSION}_${platform_dir%/}.zip" .
              cd ..
            fi
          done

      - name: Download plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: plugin-*
          path: ${{ runner.temp }}/plugins
          merge-multiple: true

      - name: Create plugin archives
        shell: bash
        run: |
          VERSION="${{ env.VERSION_DESOMNIA }}"
          VERSION="${VERSION#v}"

          cd ${{ runner.temp }}/plugins

          for plugin_dir in */; do
            if[ -d "$plugin_dir" ]; then
              cd "$plugin_dir"
              zip -r "${{ runner.temp }}/plugin-${plugin_dir%/}_${VERSION}.zip" .
              cd ..
            fi
          done

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            ${{ runner.temp }}/Desomnia_*.*
            ${{ runner.temp }}/plugin-*.zip

  release-homebrew:
    name: Create Homebrew release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        uses: dawidd6/action-homebrew-bump-formula@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          tap: mad0x20wizard/homebrew-tools
          formula: desomnia
          no_fork: true
